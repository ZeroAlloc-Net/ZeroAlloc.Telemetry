name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Calculate version
        id: gitversion
        run: |
          version=$(dotnet dotnet-gitversion /output json /showvariable SemVer)
          echo "semver=$version" >> $GITHUB_OUTPUT
          echo "Calculated version: $version"

      - name: Restore
        run: dotnet restore ZeroAlloc.Telemetry.slnx

      - name: Build
        run: dotnet build ZeroAlloc.Telemetry.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ZeroAlloc.Telemetry.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  aot-smoke:
    runs-on: ubuntu-latest
    # Publishes samples/ZeroAlloc.Telemetry.AotSmoke with PublishAot=true.
    # Exercises the generator-emitted {Name}Instrumented proxy which wraps
    # every method in Activity + Meter calls — any reflection regression fires
    # IL2026/IL3050 via ILC.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install AOT native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore samples/ZeroAlloc.Telemetry.AotSmoke/ZeroAlloc.Telemetry.AotSmoke.csproj

      - name: Publish AOT
        run: dotnet publish samples/ZeroAlloc.Telemetry.AotSmoke/ZeroAlloc.Telemetry.AotSmoke.csproj -r linux-x64 -c Release -o ./aot-out

      - name: Run AOT binary
        run: ./aot-out/ZeroAlloc.Telemetry.AotSmoke
